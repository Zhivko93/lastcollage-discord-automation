name: Weekly Lastcollage

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      preview_only:
        description: "Generate the collage without sending it to Discord"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests pillow

      - run: python weekly_lastcollage_to_discord.py
        env:
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PREVIEW_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.preview_only || 'false' }}

      - name: Upload collage preview
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.preview_only == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-collage-preview
          path: collage.png
